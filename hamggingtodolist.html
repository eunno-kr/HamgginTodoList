<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐹 햄깅이 할 일 매니저</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFFDF7; --card:#FFFFFF;
    --ol:#3d3a36;            /* 가는 마커 외곽선 */
    --orange:#F2A24E; --orange-d:#E5883A;   /* 햄깅이 부드러운 주황 */
    --sky:#BCE2F0; --sky-d:#8FCDE3;          /* 이불 하늘색 */
    --pink:#F7AEBF; --pinkbg:#FFEDF1;
    --done:#EAF4DF; --done-ol:#AFD295;
    --ink:#403a33; --line:#EAD9BD; --muted:#a99a85;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; font-family:'Gaegu','굴림',Gulim,sans-serif; color:var(--ink);
    background:
      radial-gradient(circle at 14% 16%, #fff 0 5px, transparent 6px),
      radial-gradient(circle at 84% 60%, #fff 0 4px, transparent 5px),
      var(--bg);
    background-size:96px 96px,120px 120px,auto;
    min-height:100vh; display:flex; justify-content:center; padding:30px 16px 60px;
  }
  .app{
    width:100%; max-width:480px; background:var(--card);
    border:2px solid var(--ol); border-radius:26px;
    box-shadow:6px 6px 0 var(--sky); padding:22px 22px 26px;
  }

  /* 헤더 */
  .header{ text-align:center; }
  .mascot{ width:96px; height:96px; object-fit:contain; animation:bob 2.6s ease-in-out infinite; }
  @keyframes bob{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  h1{ font-family:'Jua','굴림',sans-serif; font-size:25px; margin:2px 0 2px; color:var(--ink); letter-spacing:-1px; }
  .subtitle{ color:var(--orange-d); margin:0 0 16px; font-size:15px; }

  /* 입력 */
  .input-row{ display:flex; gap:8px; margin-bottom:8px; }
  .options-row{ display:flex; gap:8px; margin-bottom:14px; }
  input,select{
    font-family:inherit; font-size:16px; color:var(--ink);
    border:2px solid var(--ol); border-radius:13px; padding:10px 13px; outline:none; background:#fff;
  }
  #todoInput{ flex:1; }
  input:focus,select:focus{ border-color:var(--orange); }
  select{ flex:1; cursor:pointer; } input[type="date"]{ flex:1; }
  button{
    font-family:'Jua','굴림',sans-serif; font-size:15px; cursor:pointer;
    border:2px solid var(--ol); border-radius:13px; padding:10px 16px;
    background:var(--sky); color:var(--ink); transition:transform .08s;
  }
  button:hover{ transform:translate(-1px,-1px); } button:active{ transform:translate(1px,1px); }
  #addBtn{ background:var(--orange); color:#fff; white-space:nowrap; }

  /* 검색/필터/정렬 */
  .toolbar{ display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
  #searchInput{ width:100%; }
  .filter-row{ display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
  .chip{ font-family:inherit; font-size:14px; padding:6px 13px; border:2px solid var(--ol);
         border-radius:20px; background:#fff; color:var(--ink); }
  .chip.active{ background:var(--ink); color:#fff; }
  #sortSelect{ margin-left:auto; font-size:14px; padding:6px 10px; }

  /* 통계 */
  .report{ background:var(--pinkbg); border:2px dashed var(--pink); border-radius:15px;
           padding:12px 14px; margin-bottom:8px; font-size:15px; color:var(--ink); }
  .report b{ color:var(--orange-d); }
  .bar{ height:14px; background:#fff; border:2px solid var(--ol); border-radius:10px; overflow:hidden; margin-top:8px; }
  .bar>span{ display:block; height:100%; width:0; background:var(--sky-d); transition:width .4s ease; }
  .done-banner{ display:none; align-items:center; gap:8px; justify-content:center;
       background:var(--done); border:2px solid var(--done-ol); border-radius:14px;
       padding:8px; margin-bottom:8px; font-family:'Jua',sans-serif; color:#5b7a45; }
  .done-banner img{ width:38px; height:38px; }
  .done-banner.show{ display:flex; }
  .remaining{ font-size:13px; color:var(--muted); margin:6px 2px 16px; min-height:1em; }

  /* 목록 */
  .list{ list-style:none; padding:0; margin:0; }
  .item{ display:flex; align-items:center; gap:10px; background:#fff;
         border:2px solid var(--ol); border-radius:15px; padding:11px 12px; margin-bottom:10px; animation:pop .25s ease; }
  @keyframes pop{ from{transform:scale(.92); opacity:0} to{transform:scale(1); opacity:1} }
  .item.done{ background:var(--done); border-color:var(--done-ol); }
  .check{ width:26px; height:26px; flex:none; cursor:pointer; border:2px solid var(--ol);
          border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; font-size:16px; }
  .item.done .check{ background:var(--done-ol); color:#fff; }
  .body{ flex:1; min-width:0; cursor:pointer; }
  .text{ font-size:17px; word-break:break-all; }
  .item.done .text{ text-decoration:line-through; color:var(--muted); }
  .meta{ display:flex; gap:6px; margin-top:3px; flex-wrap:wrap; }
  .tag{ font-size:12px; padding:2px 8px; border-radius:10px; background:#FFF3E2; border:1.5px solid var(--line); color:var(--orange-d); }
  .tag.due{ background:#fff; color:var(--ink); }
  .tag.due.over{ background:#ffdede; border-color:#e88; color:#c0392b; }
  .star{ background:none; border:none; font-size:20px; padding:0 2px; cursor:pointer; filter:grayscale(1) opacity(.4); }
  .star.on{ filter:none; }
  .editInput{ width:100%; font-size:16px; }
  .del{ background:var(--pink); color:#fff; padding:7px 11px; font-size:13px; border-radius:11px; border-color:var(--ol); }

  /* 빈 상태 */
  .empty{ text-align:center; padding:22px 10px; color:var(--muted); }
  .empty img{ width:120px; height:120px; object-fit:contain; }
  .empty p{ font-size:16px; margin:6px 0 0; }

  .footer-tools{ display:flex; justify-content:flex-end; margin-top:6px; }
  #clearDone{ background:#fff; font-size:13px; padding:7px 12px; }
</style>
</head>

const $ = (id) => document.getElementById(id);
const todoInput=$("todoInput"), addBtn=$("addBtn"), catSelect=$("catSelect"), dueInput=$("dueInput");
const searchInput=$("searchInput"), sortSelect=$("sortSelect");
const list=$("list"), report=$("report"), remaining=$("remaining");
const clearDone=$("clearDone"), doneBanner=$("doneBanner");

const STORE_KEY = "hamgging_todos";
let todos  = loadTodos();
let filter = "all";
let keyword = "";

/* 오늘 날짜를 YYYY-MM-DD 로 (로컬 시간 기준) */
function todayStr(){
  const d = new Date();
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0,10);
}
dueInput.value = todayStr();   // 처음 열 때 오늘 날짜 기본값

/* [localStorage + JSON] 저장 / 불러오기 */
function loadTodos(){
  const raw = localStorage.getItem(STORE_KEY);
  return raw ? JSON.parse(raw) : [];          // 문자열 → 객체배열
}
function persist(){
  localStorage.setItem(STORE_KEY, JSON.stringify(todos));  // 객체배열 → 문자열
}

/* 추가 */
function addTodo(){
  const text = todoInput.value.trim();
  if(!text){ todoInput.focus(); return; }
  todos.push({
    id: Date.now(), text, category: catSelect.value,
    due: dueInput.value || "", important:false, isCompleted:false, createdAt: Date.now()
  });
  todoInput.value=""; dueInput.value=todayStr();   // 날짜는 기본 오늘날짜로 지정 및 초기화
  saveAndRender(); todoInput.focus();
}

/* [find] 클릭한 1개만 찾아서 상태 변경 */
function toggleComplete(id){ const t=todos.find(x=>x.id===id); if(t){ t.isCompleted=!t.isCompleted; saveAndRender(); } }
function toggleStar(id){ const t=todos.find(x=>x.id===id); if(t){ t.important=!t.important; saveAndRender(); } }
function editTodo(id, v){ const t=todos.find(x=>x.id===id); if(t){ t.text=v.trim()||t.text; saveAndRender(); } }

/* [filter] 삭제 = 그 id만 빼고 새 배열 */
function deleteTodo(id){ todos = todos.filter(x=>x.id!==id); saveAndRender(); }
clearDone.addEventListener("click", ()=>{
  if(!todos.some(t=>t.isCompleted)) return;
  todos = todos.filter(t=>!t.isCompleted);
  saveAndRender();
});

/* [filter + map] 통계 */
function updateReport(){
  const total = todos.length;
  const done  = todos.filter(t=>t.isCompleted).length;       // filter
  const names = todos.filter(t=>!t.isCompleted).map(t=>t.text); // filter→map
  const pct = total ? Math.round(done/total*100) : 0;

  report.innerHTML =
    `할 일 <b>${total}</b>개 · 완료 <b>${done}</b>개 · 완료율 <b>${pct}%</b>` +
    `<div class="bar"><span style="width:${pct}%"></span></div>`;
  remaining.textContent = names.length ? "🐹 남은 일: " + names.join(", ") : "🎉 다 끝났어 햄!";
  doneBanner.classList.toggle("show", total>0 && done===total);
}

/* 화면에 보여줄 목록 (filter + sort 체이닝) */
function getVisible(){
  return todos
    .filter(t => filter==="all" ? true : filter==="done" ? t.isCompleted : !t.isCompleted)
    .filter(t => t.text.toLowerCase().includes(keyword.toLowerCase()))
    .sort((a,b)=>{
      if(sortSelect.value==="due"){ if(!a.due)return 1; if(!b.due)return -1; return a.due.localeCompare(b.due); }
      if(sortSelect.value==="star"){ return (b.important-a.important)||(b.createdAt-a.createdAt); }
      return b.createdAt - a.createdAt;
    });
}

/* 렌더 + 저장 */
function saveAndRender(){
  persist();
  list.innerHTML = "";
  const visible = getVisible();
  if(visible.length===0){ list.innerHTML = emptyHTML(); }
  else { visible.forEach(t=>list.appendChild(makeItem(t))); }
  updateReport();
}

/* 항목 한 줄 */
function makeItem(todo){
  const li=document.createElement("li");
  li.className="item"+(todo.isCompleted?" done":"");

  const check=document.createElement("div");
  check.className="check"; check.textContent=todo.isCompleted?"✓":"";
  check.onclick=()=>toggleComplete(todo.id);

  const body=document.createElement("div"); body.className="body";
  const text=document.createElement("div"); text.className="text"; text.textContent=todo.text;
  text.onclick=()=>toggleComplete(todo.id);
  text.ondblclick=(e)=>{ e.stopPropagation(); startEdit(body, todo); };
  const meta=document.createElement("div"); meta.className="meta";
  const cat=document.createElement("span"); cat.className="tag"; cat.textContent=todo.category; meta.appendChild(cat);
  if(todo.due){
    const d=document.createElement("span");
    const today=todayStr();
    const over=!todo.isCompleted && todo.due<today;
    d.className="tag due"+(over?" over":""); d.textContent=(over?"⏰지남 ":"📅 ")+todo.due; meta.appendChild(d);
  }
  body.append(text, meta);

  const star=document.createElement("button");
  star.className="star"+(todo.important?" on":""); star.textContent="⭐"; star.title="중요";
  star.onclick=()=>toggleStar(todo.id);

  const del=document.createElement("button");
  del.className="del"; del.textContent="삭제"; del.onclick=()=>deleteTodo(todo.id);

  li.append(check, body, star, del);
  return li;
}

/* 인라인 수정 */
function startEdit(body, todo){
  const input=document.createElement("input");
  input.className="editInput"; input.value=todo.text;
  body.replaceChildren(input); input.focus(); input.select();
  const commit=()=>editTodo(todo.id, input.value);
  input.addEventListener("blur", commit);
  input.addEventListener("keydown", e=>{ if(e.key==="Enter")commit(); if(e.key==="Escape")saveAndRender(); });
}

/* 빈 상태 (자는 / 물음표 햄깅이) */
function emptyHTML(){
  const src = keyword ? IMG.huh : IMG.sleep;
  const msg = keyword ? "그런 건 없는데... 햄?🔍" : "할 일이 없어서 자는 중... 하나 담아줘🐹";
  return `<div class="empty"><img src="${src}" alt="햄깅이"><p>${msg}</p></div>`;
}

/* 이벤트 */
addBtn.addEventListener("click", addTodo);
todoInput.addEventListener("keydown", e=>{ if(e.key==="Enter")addTodo(); });
searchInput.addEventListener("input", e=>{ keyword=e.target.value; saveAndRender(); });
sortSelect.addEventListener("change", saveAndRender);
document.querySelectorAll(".chip").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll(".chip").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active"); filter=btn.dataset.filter; saveAndRender();
  });
});

saveAndRender();
